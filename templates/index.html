
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Marks Predictor</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background:#f4f4f4;
        }

        input{
            padding:10px;
            width:250px;
            font-size:16px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
            margin-top:15px;
        }

        button:hover{
            background:#0056b3;
        }

    </style>
</head>

<body>

    <h1>Student Marks Predictor</h1>

    <form action="/predict" method="post">

        <input
            type="number"
            step="0.1"
            name="study_hours"
            placeholder="Enter Study Hours"
            required
        >

        <br>

        <button type="submit">
            Predict Marks
        </button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
